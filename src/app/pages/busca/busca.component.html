<div class="p-6 min-h-screen bg-transparent">
    <div class="flex justify-center flex-wrap gap-6" *ngIf="animes.length; else notFound">
        <div *ngFor="let anime of animes" 
             class="anime-card glass-effect relative overflow-hidden rounded-2xl w-[220px] transition-all duration-500 hover:-translate-y-4 sakura-glow-hover group">
            
            <!-- Manga Panel Image -->
            <div class="relative h-[320px] overflow-hidden">
                <img [src]="anime.coverImage.large" 
                     [alt]="anime.title.romaji" 
                     class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60"></div>
                
                <!-- Floating Tags -->
                <div class="absolute top-3 left-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <span class="px-2 py-1 bg-pink-500 text-[10px] font-bold rounded-md uppercase tracking-tighter">Anime</span>
                </div>
            </div>

            <!-- Content -->
            <div class="p-4 relative">
                <h3 class="text-lg font-bold truncate mb-0 leading-tight">{{ anime.title.romaji }}</h3>
                <p class="font-jp text-pink-400 text-sm italic truncate mt-1 opacity-80">{{ anime.title.native }}</p>
                
                <div class="flex justify-between items-center mt-4">
                    <p-button icon="pi pi-heart" 
                              styleClass="p-button-rounded p-button-text hover:bg-pink-500/20 text-pink-400" 
                              [outlined]="true"></p-button>
                    <span class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Ver Detalhes</span>
                </div>
            </div>

            <!-- Hover Accent Line -->
            <div class="absolute bottom-0 left-0 w-full h-1 bg-pink-500 scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
        </div>
    </div>
    
    <div class="flex justify-center mt-8" *ngIf="info?.total">
        <p-paginator 
            (onPageChange)="onPageChange($event)" 
            [first]="(info.currentPage - 1) * 50" 
            [rows]="50" 
            [totalRecords]="info.total"
            styleClass="bg-transparent border-none">
        </p-paginator>
    </div>

    <ng-template #notFound>
        <div class="flex flex-col items-center justify-center py-20 text-slate-500">
            <i class="pi pi-search text-6xl mb-4 opacity-20"></i>
            <p class="text-xl font-jp italic">Nenhum anime encontrado!</p>
            <p class="text-sm opacity-60">Tente buscar por outro título em romaji ou japonês.</p>
        </div>
    </ng-template>
</div>
