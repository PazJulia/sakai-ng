<div class="dashboard-container p-4 lg:p-8 space-y-12">
    
    <!-- Hero Section: Anime em Destaque -->
    <section class="hero-section relative h-[500px] rounded-3xl overflow-hidden shadow-2xl group" *ngIf="heroAnime && heroAnime.coverImage?.large">
        <img [src]="heroAnime.coverImage.large" alt="Hero Background" class="absolute inset-0 w-full h-full object-cover filter brightness-50 transition-transform duration-1000 group-hover:scale-105" />
        <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/40 to-transparent"></div>
        
        <div class="relative h-full flex flex-col justify-center px-8 lg:px-16 space-y-6 max-w-2xl">
            <span class="inline-block px-3 py-1 bg-pink-500 text-xs font-bold rounded-full w-fit animate-bounce tracking-widest uppercase">#1 Trending</span>
            <h1 class="text-4xl lg:text-6xl font-bold tracking-tight leading-tight">{{ heroAnime.title.romaji }}</h1>
            <p class="font-jp text-pink-400 text-xl italic opacity-90">{{ heroAnime.title.native }}</p>
            <p class="text-slate-300 text-sm lg:text-base line-clamp-3 leading-relaxed" [innerHTML]="heroAnime.description"></p>
            
            <div class="flex gap-4 pt-4">
                <p-button label="Ver Detalhes" icon="pi pi-play" styleClass="p-button-rounded bg-pink-500 hover:bg-pink-600 border-none shadow-lg px-8 py-3 font-semibold"></p-button>
                <p-button icon="pi pi-heart" styleClass="p-button-rounded p-button-outlined border-white text-white hover:bg-white/10" [outlined]="true"></p-button>
            </div>
        </div>
    </section>

    <!-- Lista de Favoritos -->
    <section class="favorites-section" *ngIf="favoritos.length > 0">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold border-l-4 border-pink-500 pl-4">Seus Favoritos</h2>
            <a routerLink="/favoritos" class="text-pink-400 text-sm hover:underline">Ver todos</a>
        </div>
        <p-carousel [value]="favoritos" [numVisible]="5" [numScroll]="1" [circular]="false" [responsiveOptions]="responsiveOptions">
            <ng-template let-anime #item>
                <div class="p-2">
                    <div class="anime-card glass-effect relative overflow-hidden rounded-2xl transition-all duration-500 hover:-translate-y-2 sakura-glow-hover group">
                        <img *ngIf="anime?.coverImage?.large" [src]="anime.coverImage.large" class="w-full h-[280px] object-cover" />
                        <div class="p-3">
                            <h3 class="text-sm font-bold truncate leading-tight group-hover:text-pink-400">{{ anime.title.romaji }}</h3>
                        </div>
                    </div>
                </div>
            </ng-template>
        </p-carousel>
    </section>

    <!-- Populares no Momento -->
    <section class="trending-section">
        <div class="flex items-center mb-6">
            <h2 class="text-2xl font-bold border-l-4 border-pink-500 pl-4">Populares no Momento</h2>
        </div>
        <p-carousel [value]="trendingAnimes" [numVisible]="5" [numScroll]="1" [circular]="true" [autoplayInterval]="5000" [responsiveOptions]="responsiveOptions">
            <ng-template let-anime #item>
                <div class="p-2">
                    <div class="anime-card glass-effect relative overflow-hidden rounded-2xl transition-all duration-500 hover:-translate-y-2 sakura-glow-hover group">
                        <img *ngIf="anime?.coverImage?.large" [src]="anime.coverImage.large" class="w-full h-[280px] object-cover" />
                        <div class="p-3">
                            <h3 class="text-sm font-bold truncate leading-tight group-hover:text-pink-400">{{ anime.title.romaji }}</h3>
                        </div>
                    </div>
                </div>
            </ng-template>
        </p-carousel>
    </section>

    <!-- Populares de Todos os Tempos -->
    <section class="popular-section">
        <div class="flex items-center mb-6">
            <h2 class="text-2xl font-bold border-l-4 border-blue-500 pl-4">Populares de Todos os Tempos</h2>
        </div>
        <p-carousel [value]="popularAnimes" [numVisible]="5" [numScroll]="1" [circular]="true" [responsiveOptions]="responsiveOptions">
            <ng-template let-anime #item>
                <div class="p-2">
                    <div class="anime-card glass-effect relative overflow-hidden rounded-2xl transition-all duration-500 hover:-translate-y-2 sakura-glow-hover group">
                        <img *ngIf="anime?.coverImage?.large" [src]="anime.coverImage.large" class="w-full h-[280px] object-cover" />
                        <div class="p-3">
                            <h3 class="text-sm font-bold truncate leading-tight group-hover:text-pink-400">{{ anime.title.romaji }}</h3>
                        </div>
                    </div>
                </div>
            </ng-template>
        </p-carousel>
    </section>

    <!-- Navegar por Gêneros -->
    <section class="genres-section pb-12">
        <div class="flex items-center mb-6">
            <h2 class="text-2xl font-bold border-l-4 border-emerald-500 pl-4">Explorar Gêneros</h2>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
            <button *ngFor="let genero of generos" 
                    (click)="navegarGenero(genero)"
                    class="genre-btn glass-effect p-4 rounded-xl text-center font-bold hover:bg-pink-500 hover:text-white transition-all duration-300 active:scale-95 shadow-sm">
                {{ genero }}
            </button>
        </div>
    </section>

</div>
