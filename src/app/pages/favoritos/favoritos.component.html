<div class="p-6 md:p-8 min-h-screen bg-transparent animate-fade-in">

    <div class="flex items-center gap-4 mb-8">
        <span class="w-2 h-10 bg-pink-500 rounded-full"></span>
        <h1 class="text-3xl font-black tracking-tight text-white uppercase">Meus Favoritos</h1>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6">
        <div *ngFor="let item of [1,2,3,4,5,6]" class="anime-card glass-effect rounded-2xl h-[380px] animate-pulse">
            <div class="h-full w-full bg-slate-800/50 rounded-2xl"></div>
        </div>
    </div>

    <!-- Content -->
    <div *ngIf="!loading && allFavorites.length > 0; else emptyState">
        <div class="flex flex-col gap-4 max-w-5xl mx-auto">
            <div *ngFor="let fav of paginatedFavorites"
                class="fav-list-item glass-effect flex items-center p-3 rounded-2xl group transition-all duration-300 hover:bg-slate-800/40">

                <!-- Poster Thumb -->
                <div class="relative w-16 h-20 md:w-20 md:h-24 flex-shrink-0 overflow-hidden rounded-xl cursor-pointer"
                    [routerLink]="['/anime', fav.anime_id]">
                    <img [src]="fav.imagem" [alt]="fav.nome" class="w-full h-full object-cover" />
                </div>

                <!-- Info -->
                <div class="flex-1 px-4 md:px-6">
                    <h3 class="text-base md:text-lg font-bold transition-colors group-hover:text-pink-400 cursor-pointer"
                        [routerLink]="['/anime', fav.anime_id]">{{ fav.nome }}</h3>
                    <div class="flex items-center gap-3 mt-1">
                        <div class="flex items-center gap-2">
                            <p-rating [(ngModel)]="fav.rating" [stars]="10" (onRate)="onRatingChange(fav.anime_id, $event.value)"
                                      styleClass="rating-noir-small">
                            </p-rating>
                            <span *ngIf="fav.rating" class="text-[10px] text-pink-400 font-bold opacity-70">
                                {{ fav.rating }}/10
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center pr-2">
                    <p-button icon="pi pi-trash" [text]="true" [rounded]="true" severity="danger"
                        (click)="remover(fav.anime_id)" label="Remover"
                        styleClass="text-xs font-bold hover:bg-red-500/10 transition-colors hidden md:flex">
                    </p-button>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <div class="flex justify-center mt-12 bg-transparent">
            <p-paginator (onPageChange)="onPageChange($event)" [first]="first" [rows]="rows"
                [totalRecords]="allFavorites.length" [rowsPerPageOptions]="[12, 24, 48]"
                styleClass="glass-effect rounded-xl border-none p-2">
            </p-paginator>
        </div>
    </div>

    <!-- Empty State -->
    <ng-template #emptyState>
        <div *ngIf="!loading"
            class="flex flex-col items-center justify-center min-h-[50vh] glass-effect rounded-3xl p-12 text-center border-dashed border-2 border-white/5">
            <i class="pi pi-heart-fill text-6xl text-slate-800 mb-6"></i>
            <h2 class="text-2xl font-bold mb-2">Sua lista está vazia</h2>
            <p class="text-slate-400 mb-8 max-w-sm">Você ainda não adicionou nenhum anime aos seus favoritos. Comece a
                explorar e adicione os que você mais gosta!</p>
            <p-button label="Descobrir Animes" icon="pi pi-compass" routerLink="/"
                styleClass="p-button-rounded bg-pink-500 border-none px-6 py-3 font-bold shadow-lg"></p-button>
        </div>
    </ng-template>

</div>
